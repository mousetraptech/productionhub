# Production Hub — Action Registry
# Maps human-readable MOD actions to OSC command bundles.
# The MOD interface never sees OSC addresses — only action labels.

actions:
  # ─── House Lights (ChamSys playback 10) ───
  house-full:
    label: "Full"
    category: "House Lights"
    icon: "🏠"
    color: "#F59E0B"
    description: "House lights to 100% (3s fade)"
    commands:
      - device: chamsys
        address: /pb/10
        args: [1.0, 3.0, "scurve"]

  house-half:
    label: "Half"
    category: "House Lights"
    icon: "🏠"
    color: "#F59E0B"
    description: "House lights to 50% (3s fade)"
    commands:
      - device: chamsys
        address: /pb/10
        args: [0.5, 3.0, "scurve"]

  house-out:
    label: "Out"
    category: "House Lights"
    icon: "🏠"
    color: "#F59E0B"
    description: "House lights off (3s fade)"
    commands:
      - device: chamsys
        address: /pb/10
        args: [0.0, 3.0, "scurve"]

  house-preset-walk:
    label: "Walk-in"
    category: "House Lights"
    icon: "🏠"
    color: "#F59E0B"
    description: "Warm walk-in preset 70% (3s fade)"
    commands:
      - device: chamsys
        address: /pb/10
        args: [0.7, 3.0, "scurve"]

  # ─── Stage Lights ───
  stage-full:
    label: "Full Wash"
    category: "Stage Lights"
    icon: "💡"
    color: "#8B5CF6"
    description: "Full stage wash"
    commands:
      - device: chamsys
        address: /pb/1/1

  stage-warm:
    label: "Warm"
    category: "Stage Lights"
    icon: "💡"
    color: "#8B5CF6"
    description: "Warm stage preset"
    commands:
      - device: chamsys
        address: /pb/1/2

  stage-cool:
    label: "Cool"
    category: "Stage Lights"
    icon: "💡"
    color: "#8B5CF6"
    description: "Cool stage preset"
    commands:
      - device: chamsys
        address: /pb/1/3

  stage-spot:
    label: "Spotlight"
    category: "Stage Lights"
    icon: "💡"
    color: "#8B5CF6"
    description: "Center spot only"
    commands:
      - device: chamsys
        address: /pb/1/4

  stage-blackout:
    label: "Blackout"
    category: "Stage Lights"
    icon: "💡"
    color: "#8B5CF6"
    description: "Stage to black"
    commands:
      - device: chamsys
        address: /pb/1/5

  # ─── Audio ───
  audio-walkin:
    label: "Walk-in Music"
    category: "Audio"
    icon: "🔊"
    color: "#10B981"
    description: "Start walk-in playlist"
    commands:
      - device: avantis
        address: /ch/33/mix/mute
        args: [0]
      - device: avantis
        address: /ch/33/mix/fader
        args: [0.75]

  audio-walkin-fade:
    label: "Fade Walk-in"
    category: "Audio"
    icon: "🔊"
    color: "#10B981"
    description: "Fade out walk-in music"
    commands:
      - device: avantis
        address: /ch/33/mix/fade
        args: [0.0, 3.0, "scurve"]

  audio-mains-up:
    label: "Mains Up"
    category: "Audio"
    icon: "🔊"
    color: "#10B981"
    description: "Main speakers live"
    commands:
      - device: avantis
        address: /main/mix/mute
        args: [0]
      - device: avantis
        address: /main/mix/fader
        args: [0.75]

  audio-mains-mute:
    label: "Mains Mute"
    category: "Audio"
    icon: "🔊"
    color: "#10B981"
    description: "Mute main speakers"
    commands:
      - device: avantis
        address: /main/mix/mute
        args: [1]

  # ─── Livestream ───
  stream-start:
    label: "Go Live"
    category: "Livestream"
    icon: "📹"
    color: "#EF4444"
    description: "Start livestream"
    commands:
      - device: obs
        address: /stream/start

  stream-brb:
    label: "BRB"
    category: "Livestream"
    icon: "📹"
    color: "#EF4444"
    description: "Show BRB screen"
    commands:
      - device: obs
        address: /scene/BRB

  stream-stop:
    label: "End Stream"
    category: "Livestream"
    icon: "📹"
    color: "#EF4444"
    description: "Stop livestream"
    commands:
      - device: obs
        address: /stream/stop

  # ─── Camera 1 ───
  cam1-wide:
    label: "Wide Shot"
    category: "Camera 1"
    icon: "🎥"
    color: "#06B6D4"
    description: "Cam 1 to wide angle"
    commands:
      - device: visca
        prefix: cam1
        address: /preset/recall/1

  cam1-stage:
    label: "Stage"
    category: "Camera 1"
    icon: "🎥"
    color: "#06B6D4"
    description: "Cam 1 to stage center"
    commands:
      - device: visca
        prefix: cam1
        address: /preset/recall/2

  cam1-piano:
    label: "Piano"
    category: "Camera 1"
    icon: "🎥"
    color: "#06B6D4"
    description: "Cam 1 to piano position"
    commands:
      - device: visca
        prefix: cam1
        address: /preset/recall/3

  cam1-audience:
    label: "Audience"
    category: "Camera 1"
    icon: "🎥"
    color: "#06B6D4"
    description: "Cam 1 to audience"
    commands:
      - device: visca
        prefix: cam1
        address: /preset/recall/4

  cam1-home:
    label: "Home"
    category: "Camera 1"
    icon: "🎥"
    color: "#06B6D4"
    description: "Cam 1 to home position"
    commands:
      - device: visca
        prefix: cam1
        address: /home

  # ─── Camera 2 ───
  cam2-wide:
    label: "Wide Shot"
    category: "Camera 2"
    icon: "🎥"
    color: "#0891B2"
    description: "Cam 2 to wide angle"
    commands:
      - device: visca
        prefix: cam2
        address: /preset/recall/1

  cam2-stage:
    label: "Stage"
    category: "Camera 2"
    icon: "🎥"
    color: "#0891B2"
    description: "Cam 2 to stage center"
    commands:
      - device: visca
        prefix: cam2
        address: /preset/recall/2

  cam2-piano:
    label: "Piano"
    category: "Camera 2"
    icon: "🎥"
    color: "#0891B2"
    description: "Cam 2 to piano position"
    commands:
      - device: visca
        prefix: cam2
        address: /preset/recall/3

  cam2-audience:
    label: "Audience"
    category: "Camera 2"
    icon: "🎥"
    color: "#0891B2"
    description: "Cam 2 to audience"
    commands:
      - device: visca
        prefix: cam2
        address: /preset/recall/4

  cam2-home:
    label: "Home"
    category: "Camera 2"
    icon: "🎥"
    color: "#0891B2"
    description: "Cam 2 to home position"
    commands:
      - device: visca
        prefix: cam2
        address: /home

  # ─── Camera 3 ───
  cam3-wide:
    label: "Wide Shot"
    category: "Camera 3"
    icon: "🎥"
    color: "#0E7490"
    description: "Cam 3 to wide angle"
    commands:
      - device: visca
        prefix: cam3
        address: /preset/recall/1

  cam3-stage:
    label: "Stage"
    category: "Camera 3"
    icon: "🎥"
    color: "#0E7490"
    description: "Cam 3 to stage center"
    commands:
      - device: visca
        prefix: cam3
        address: /preset/recall/2

  cam3-piano:
    label: "Piano"
    category: "Camera 3"
    icon: "🎥"
    color: "#0E7490"
    description: "Cam 3 to piano position"
    commands:
      - device: visca
        prefix: cam3
        address: /preset/recall/3

  cam3-audience:
    label: "Audience"
    category: "Camera 3"
    icon: "🎥"
    color: "#0E7490"
    description: "Cam 3 to audience"
    commands:
      - device: visca
        prefix: cam3
        address: /preset/recall/4

  cam3-home:
    label: "Home"
    category: "Camera 3"
    icon: "🎥"
    color: "#0E7490"
    description: "Cam 3 to home position"
    commands:
      - device: visca
        prefix: cam3
        address: /home

  # ─── SFX (QLab Utility) ───
  sfx-go:
    label: "SFX GO"
    category: "SFX"
    icon: "🔈"
    color: "#6366F1"
    description: "Advance SFX playhead"
    commands:
      - device: qlab
        prefix: sfx
        address: /go

  sfx-stop:
    label: "SFX Stop"
    category: "SFX"
    icon: "🔈"
    color: "#6366F1"
    description: "Stop all SFX"
    commands:
      - device: qlab
        prefix: sfx
        address: /stop

  sfx-panic:
    label: "SFX Panic"
    category: "SFX"
    icon: "🔈"
    color: "#6366F1"
    description: "Panic — fade out all SFX"
    commands:
      - device: qlab
        prefix: sfx
        address: /panic

  # ─── Show (QLab Show) ───
  show-go:
    label: "Show GO"
    category: "Show"
    icon: "🎬"
    color: "#8B5CF6"
    description: "Advance show cue list"
    commands:
      - device: qlab
        prefix: show
        address: /go

  show-stop:
    label: "Show Stop"
    category: "Show"
    icon: "🎬"
    color: "#8B5CF6"
    description: "Stop all show cues"
    commands:
      - device: qlab
        prefix: show
        address: /stop

  show-panic:
    label: "Show Panic"
    category: "Show"
    icon: "🎬"
    color: "#8B5CF6"
    description: "Panic — fade out all show cues"
    commands:
      - device: qlab
        prefix: show
        address: /panic

  # ─── Show Lifecycle ───
  show-toggle:
    label: "Start Show"
    category: "Show Lifecycle"
    icon: "🎬"
    color: "#6b4fa0"
    description: "Start/end show — toggles based on active show state"
    commands: []

  # ─── Production Hub (Cue Sequencer) ───
  ph-go:
    label: "Cue GO"
    category: "PH"
    icon: "▶️"
    color: "#22C55E"
    description: "Fire next cue in the PH cue sequencer"
    commands:
      - prefix: hub
        address: /go

  ph-stop:
    label: "Stop"
    category: "PH"
    icon: "⏹️"
    color: "#EF4444"
    description: "Stop the PH cue sequencer"
    commands:
      - prefix: hub
        address: /stop

  ph-back:
    label: "Back"
    category: "PH"
    icon: "⏮️"
    color: "#F59E0B"
    description: "Move playhead back one cue"
    commands:
      - prefix: hub
        address: /back

  ph-panic:
    label: "Panic"
    category: "PH"
    icon: "🚨"
    color: "#DC2626"
    description: "Emergency stop — kill all fades and stop sequencer"
    commands:
      - prefix: hub
        address: /panic

  # ─── Projector (Broadlink IR) ───
  projector-on:
    label: "Projector On"
    category: "Projector"
    icon: "📽️"
    color: "#7C3AED"
    description: "Turn on the Optoma projector"
    commands:
      - device: broadlink
        address: /send/optoma_power

  projector-off:
    label: "Projector Off"
    category: "Projector"
    icon: "📽️"
    color: "#7C3AED"
    description: "Turn off the Optoma projector"
    commands:
      - device: broadlink
        address: /send/optoma_power_off

  # ─── Video Switch ───
  video-guest-laptop:
    label: "Guest Laptop"
    category: "Video"
    icon: "🖥️"
    color: "#2563EB"
    description: "Switch video to guest laptop (HDMI 1)"
    commands:
      - device: video-switch
        address: /input/1

  video-wireless:
    label: "Wireless HDMI"
    category: "Video"
    icon: "📡"
    color: "#2563EB"
    description: "Switch video to wireless HDMI (HDMI 3)"
    commands:
      - device: video-switch
        address: /input/3

  # ─── Recording (NDI) ───
  recorder-start:
    label: "Start Recording"
    category: "Recording"
    icon: "⏺️"
    color: "#EF4444"
    description: "Start NDI recording on all sources"
    commands:
      - device: ndi-recorder
        address: /start

  recorder-stop:
    label: "Stop Recording"
    category: "Recording"
    icon: "⏹️"
    color: "#EF4444"
    description: "Stop NDI recording, auto-archive to NAS"
    commands:
      - device: ndi-recorder
        address: /stop
